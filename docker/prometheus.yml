global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "factorio-brewery"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9464"]

  - job_name: "camunda-orchestration"
    scrape_interval: 15s
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["orchestration:9600"]
